<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .error-box { text-align: center; max-width: 420px; padding: 20px; }
    .error-code { font-size: 7rem; font-weight: 800; color: #6366f1; line-height: 1;
                  background: linear-gradient(135deg,#6366f1,#a855f7);
                  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body>
  <div class="error-box">
    <div class="error-code">404</div>
    <h4 class="mt-2 fw-bold">Page Not Found</h4>
    <p class="text-muted">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/dashboard" class="btn btn-primary mt-2">
      <i class="bi bi-house-fill me-1"></i>Go to Dashboard
    </a>
  </div>
</body>
</html>
